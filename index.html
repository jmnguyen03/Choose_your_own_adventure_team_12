<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cave of Time — Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #0a100c;
      --bg1: #121a14;
      --bg-moss: rgba(60, 90, 55, 0.12);
      --panel: #161f1a;
      --panel-raised: #1e2a22;
      --panel-edge: #3d5245;
      --panel-edge-soft: #2a3830;
      --panel-inner: #e9e5db;
      --hud-text: #c5d4c8;
      --moss: #8fbc8f;
      --moss-dim: #5a7a62;
      --ember: #c9956c;
      --ember-dim: #8a6a4a;
      --accent: #9ed4a8;
      --danger: #e08070;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 80% 20%, rgba(50, 80, 45, 0.2), transparent 55%),
        radial-gradient(ellipse 60% 40% at 10% 80%, rgba(30, 45, 38, 0.35), transparent 50%),
        linear-gradient(168deg, var(--bg0) 0%, var(--bg1) 45%, #0d140f 100%);
      color: var(--hud-text);
      font-family: "Rajdhani", system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.45;
      padding: clamp(10px, 2.5vw, 20px);
    }

    .game-shell {
      max-width: 1120px;
      margin: 0 auto;
      border: 2px solid var(--panel-edge);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(40, 55, 45, 0.25) 0%, transparent 40%),
        linear-gradient(180deg, #141c17 0%, #0e1511 100%);
      box-shadow:
        0 0 0 1px rgba(120, 160, 130, 0.06) inset,
        0 24px 56px var(--shadow);
      overflow: hidden;
    }

    /* HUD */
    .hud {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #1c2820 0%, #141d18 100%);
      border-bottom: 2px solid var(--panel-edge-soft);
    }

    @media (max-width: 640px) {
      .hud {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .hud-stats {
        justify-content: center;
      }
    }

    .hud-brand {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hud-title {
      margin: 0;
      font-size: clamp(1.15rem, 3.5vw, 1.45rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ember);
      text-shadow: 0 0 18px rgba(180, 140, 90, 0.35);
    }

    .hud-tag {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--moss-dim);
    }

    .hud-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      justify-content: flex-end;
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--panel-edge);
      border-radius: 8px;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--moss-dim);
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      min-width: 2ch;
      text-align: right;
    }

    .hud-btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--panel-edge);
      background: linear-gradient(180deg, #2a382f, #1e2822);
      color: var(--ember);
      cursor: pointer;
      white-space: nowrap;
    }

    .hud-btn:hover,
    .hud-btn:focus-visible {
      background: linear-gradient(180deg, #354a3e, #26332c);
      outline: none;
    }

    /* Main grid: story left, actions + trail + map right */
    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 0;
      align-items: stretch;
      min-height: min(78vh, 860px);
    }

    @media (max-width: 900px) {
      .game-layout {
        grid-template-columns: 1fr;
        min-height: auto;
      }
    }

    .play-column {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--panel-edge-soft);
    }

    @media (max-width: 900px) {
      .play-column {
        border-right: none;
        border-bottom: 1px solid var(--panel-edge-soft);
        min-height: min(42vh, 480px);
      }
    }

    .panel-header {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--moss-dim);
      background: rgba(0, 0, 0, 0.28);
      border-bottom: 1px solid var(--panel-edge-soft);
    }

    .panel--story {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .story-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 20px;
      background: linear-gradient(180deg, #f0ebe2 0%, var(--panel-inner) 100%);
      color: #1a1f1a;
      box-shadow: inset 0 0 40px rgba(40, 55, 42, 0.06);
    }

    .story {
      margin: 0;
      white-space: pre-wrap;
      font-family: "Crimson Pro", Georgia, serif;
      font-size: 1.08rem;
      line-height: 1.65;
      text-align: left;
    }

    .panel--actions {
      flex: 0 0 auto;
      background: var(--panel-raised);
      border-bottom: 1px solid var(--panel-edge-soft);
    }

    .choice-grid {
      padding: 10px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: min(38vh, 320px);
      overflow-y: auto;
    }

    .choice {
      display: flex;
      align-items: stretch;
      gap: 0;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      color: #e4ebe6;
      background: linear-gradient(180deg, #2a3830, #1f2a24);
      border: 2px solid var(--panel-edge-soft);
      border-radius: 10px;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.08s, box-shadow 0.15s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: var(--moss);
      box-shadow: 0 0 0 1px rgba(143, 188, 143, 0.35);
      outline: none;
    }

    .choice:active {
      transform: scale(0.995);
    }

    .choice-key {
      flex: 0 0 40px;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.35);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
      border-right: 1px solid var(--panel-edge-soft);
    }

    .choice-text {
      flex: 1;
      padding: 10px 12px;
      line-height: 1.38;
    }

    .ending {
      padding: 16px 14px 20px;
      text-align: center;
    }

    .ending h2 {
      margin: 0 0 8px;
      font-family: "Rajdhani", sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ember);
    }

    .ending p {
      margin: 0 0 16px;
      color: var(--hud-text);
      font-size: 0.9rem;
    }

    .restart {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 11px 24px;
      border-radius: 10px;
      border: 2px solid var(--moss-dim);
      background: rgba(90, 122, 98, 0.2);
      color: var(--accent);
      cursor: pointer;
    }

    .restart:hover,
    .restart:focus-visible {
      background: rgba(90, 122, 98, 0.35);
      outline: none;
    }

    /* Sidebar: actions on top, trail fills middle, map bottom */
    .side-column {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, rgba(20, 28, 22, 0.6) 0%, rgba(10, 14, 11, 0.85) 100%);
    }

    .run-log {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 72px;
      min-width: 0;
    }

    .route-run {
      padding: 10px 12px 12px;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      flex: 1;
    }

    .route-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .route-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(80, 120, 90, 0.2);
      border: 1px solid rgba(120, 160, 130, 0.35);
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .route-chip.current {
      background: rgba(201, 149, 108, 0.2);
      border-color: var(--ember);
      color: var(--ember);
    }

    .route-arrow {
      color: var(--moss-dim);
      font-size: 0.75rem;
      user-select: none;
    }

    .map-tab {
      flex: 0 0 auto;
      border-top: 1px solid var(--panel-edge-soft);
      padding: 10px 12px 12px;
    }

    .map-tab-btn {
      width: 100%;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 12px 14px;
      border-radius: 8px;
      border: 2px solid var(--panel-edge);
      background: linear-gradient(180deg, #2c3d32, #1f2b24);
      color: var(--ember);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: border-color 0.15s, background 0.15s, transform 0.06s;
    }

    .map-tab-btn:hover,
    .map-tab-btn:focus-visible {
      border-color: var(--moss);
      background: linear-gradient(180deg, #354a3c, #26332c);
      outline: none;
    }

    .map-tab-btn:active {
      transform: scale(0.99);
    }

    .map-tab-btn .map-tab-sub {
      display: block;
      margin-top: 4px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: none;
      color: var(--moss-dim);
    }

    /* Fullscreen-style map modal */
    .map-modal[hidden] {
      display: none !important;
    }

    .map-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 2vw, 20px);
    }

    .map-modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: rgba(5, 10, 8, 0.82);
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    .map-modal-dialog {
      position: relative;
      z-index: 1;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      width: min(98vw, 1600px);
      height: min(96vh, 1200px);
      max-height: 96vh;
      background: linear-gradient(180deg, #1a241e 0%, #121814 100%);
      border: 2px solid var(--panel-edge);
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(100, 140, 110, 0.12) inset,
        0 24px 80px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .map-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 12px 18px;
      border-bottom: 1px solid var(--panel-edge-soft);
      background: rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }

    .map-modal-header h2 {
      margin: 0;
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--moss);
    }

    .map-modal-close {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--panel-edge-soft);
      background: #1e2822;
      color: var(--ember);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .map-modal-close:hover,
    .map-modal-close:focus-visible {
      border-color: var(--moss);
      color: #f0e8e0;
      outline: none;
    }

    .map-modal-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #070a08;
      -webkit-overflow-scrolling: touch;
    }

    .map-modal-scroll img {
      display: block;
      width: auto;
      min-width: min(2400px, 220vw);
      max-width: none;
      height: auto;
      filter: sepia(0.25) saturate(0.9) hue-rotate(-6deg);
    }

    .map-modal-hint {
      margin: 0;
      padding: 8px 14px 10px;
      font-size: 0.72rem;
      color: var(--moss-dim);
      text-align: center;
      border-top: 1px solid var(--panel-edge-soft);
      background: rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    }

    .kbd-hint {
      padding: 6px 12px 8px;
      font-size: 0.7rem;
      color: var(--moss-dim);
      letter-spacing: 0.04em;
      margin: 0;
    }

    .kbd-hint kbd {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--panel-edge);
      background: rgba(0, 0, 0, 0.35);
      font-family: inherit;
      font-size: 0.85em;
      color: var(--hud-text);
    }

    .error {
      color: var(--danger);
      font-family: "Crimson Pro", serif;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <header class="hud">
      <div class="hud-brand">
        <h1 class="hud-title">The Cave of Time</h1>
        <span class="hud-tag">Deep cave · Old forest</span>
      </div>
      <div class="hud-stats">
        <div class="stat">
          <span class="stat-label">Page</span>
          <span id="pageLabel" class="stat-value">2</span>
        </div>
        <div class="stat">
          <span class="stat-label">Choices made</span>
          <span id="decisionLabel" class="stat-value">0</span>
        </div>
      </div>
      <button type="button" class="hud-btn" id="newGameBtn" title="Reset to the beginning">New game</button>
    </header>

    <div class="game-layout">
      <div class="play-column">
        <div class="panel panel--story">
          <div class="panel-header">Story</div>
          <div class="story-scroll">
            <p id="storyText" class="story">Loading…</p>
          </div>
        </div>
      </div>

      <aside class="side-column" aria-label="Actions and progress">
        <div class="panel panel--actions">
          <div class="panel-header">Choose a path</div>
          <p class="kbd-hint">Keys <kbd>1</kbd>–<kbd>9</kbd> select an option.</p>
          <section id="choices" class="choice-grid" aria-label="Choices"></section>
        </div>
        <div class="panel run-log">
          <div class="panel-header">Trail</div>
          <div id="routeTracker" class="route-run" aria-label="Pages visited this run"></div>
        </div>
        <div class="map-tab">
          <button type="button" class="map-tab-btn" id="openMapBtn" aria-expanded="false" aria-controls="mapModal">
            World map
            <span class="map-tab-sub">Opens full-screen · scroll to explore</span>
          </button>
        </div>
      </aside>
    </div>
  </div>

  <div id="mapModal" class="map-modal" hidden aria-hidden="true">
    <div class="map-modal-backdrop" id="mapModalBackdrop" tabindex="-1"></div>
    <div
      class="map-modal-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="mapModalTitle"
    >
      <div class="map-modal-header">
        <h2 id="mapModalTitle">World map — full graph</h2>
        <button type="button" class="map-modal-close" id="closeMapBtn" aria-label="Close map">×</button>
      </div>
      <div class="map-modal-scroll">
        <img src="output/cot-story-graph.svg" alt="All branching paths in the story">
      </div>
      <p class="map-modal-hint">Scroll to pan around the graph · Esc or outside click to close</p>
    </div>
  </div>

  <script>
    const START_PAGE = "2";
    let storyData = {};
    let currentPage = START_PAGE;
    let decisionCount = 0;
    let routeHistory = [START_PAGE];
    let choiceKeyHandler = null;

    const pageLabel = document.getElementById("pageLabel");
    const decisionLabel = document.getElementById("decisionLabel");
    const storyText = document.getElementById("storyText");
    const choicesContainer = document.getElementById("choices");
    const routeTracker = document.getElementById("routeTracker");
    const newGameBtn = document.getElementById("newGameBtn");
    const mapModal = document.getElementById("mapModal");
    const openMapBtn = document.getElementById("openMapBtn");
    const closeMapBtn = document.getElementById("closeMapBtn");
    const mapModalBackdrop = document.getElementById("mapModalBackdrop");

    function openMapModal() {
      mapModal.hidden = false;
      mapModal.setAttribute("aria-hidden", "false");
      openMapBtn.setAttribute("aria-expanded", "true");
      document.body.style.overflow = "hidden";
      closeMapBtn.focus();
    }

    function closeMapModal() {
      mapModal.hidden = true;
      mapModal.setAttribute("aria-hidden", "true");
      openMapBtn.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
      openMapBtn.focus();
    }

    openMapBtn.addEventListener("click", openMapModal);
    closeMapBtn.addEventListener("click", closeMapModal);
    mapModalBackdrop.addEventListener("click", closeMapModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !mapModal.hidden) {
        e.preventDefault();
        closeMapModal();
      }
    });

    function updateMeta() {
      pageLabel.textContent = currentPage;
      decisionLabel.textContent = String(decisionCount);
    }

    function renderRoute() {
      routeTracker.innerHTML = "";
      const line = document.createElement("div");
      line.className = "route-line";
      routeHistory.forEach((page, i) => {
        if (i > 0) {
          const arrow = document.createElement("span");
          arrow.className = "route-arrow";
          arrow.textContent = "→";
          line.appendChild(arrow);
        }
        const chip = document.createElement("span");
        chip.className = "route-chip" + (page === currentPage ? " current" : "");
        chip.textContent = page;
        line.appendChild(chip);
      });
      routeTracker.appendChild(line);
    }

    function detachChoiceKeys() {
      if (choiceKeyHandler) {
        document.removeEventListener("keydown", choiceKeyHandler);
        choiceKeyHandler = null;
      }
    }

    function attachChoiceKeys(buttons) {
      detachChoiceKeys();
      if (!buttons.length) return;
      choiceKeyHandler = (e) => {
        if (e.defaultPrevented || e.ctrlKey || e.metaKey || e.altKey) return;
        if (!mapModal.hidden) return;
        const n = e.key;
        if (n >= "1" && n <= "9") {
          const idx = parseInt(n, 10) - 1;
          if (idx < buttons.length) {
            e.preventDefault();
            buttons[idx].click();
          }
        }
      };
      document.addEventListener("keydown", choiceKeyHandler);
    }

    function newGame() {
      detachChoiceKeys();
      currentPage = START_PAGE;
      decisionCount = 0;
      routeHistory = [START_PAGE];
      renderPage(START_PAGE);
    }

    newGameBtn.addEventListener("click", newGame);

    function renderPage(page) {
      const pageData = storyData[page];
      if (!pageData) {
        storyText.innerHTML = '<span class="error">Missing page data.</span>';
        choicesContainer.innerHTML = "";
        detachChoiceKeys();
        return;
      }

      currentPage = page;
      updateMeta();
      renderRoute();
      storyText.textContent = pageData.text || "[No text available for this page.]";
      choicesContainer.innerHTML = "";

      if (!pageData.choices || pageData.choices.length === 0) {
        detachChoiceKeys();
        const ending = document.createElement("div");
        ending.className = "ending";
        ending.innerHTML = "<h2>Game over</h2><p>This branch ends here. Try another path next time.</p>";

        const restart = document.createElement("button");
        restart.className = "restart";
        restart.type = "button";
        restart.textContent = "Play again";
        restart.addEventListener("click", newGame);

        ending.appendChild(restart);
        choicesContainer.appendChild(ending);
        return;
      }

      const buttons = [];
      pageData.choices.forEach((choice, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice";
        btn.innerHTML =
          '<span class="choice-key">' + (i + 1) + "</span>" +
          '<span class="choice-text">' + escapeHtml(choice.text) + "</span>";
        btn.addEventListener("click", () => {
          decisionCount += 1;
          routeHistory.push(choice.page);
          renderPage(choice.page);
        });
        choicesContainer.appendChild(btn);
        buttons.push(btn);
      });
      attachChoiceKeys(buttons);
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    async function init() {
      try {
        const response = await fetch("output/story.json");
        if (!response.ok) {
          throw new Error("Failed to load story.json (" + response.status + ")");
        }

        storyData = await response.json();
        if (!storyData[START_PAGE]) {
          throw new Error("Start page 2 not found in story data.");
        }

        newGame();
      } catch (error) {
        pageLabel.textContent = "?";
        decisionLabel.textContent = "0";
        storyText.innerHTML = '<span class="error">Could not load story: ' + escapeHtml(error.message) + "</span>";
        choicesContainer.innerHTML = "";
        detachChoiceKeys();
      }
    }

    init();
  </script>
</body>
</html>
